connections:
  - id: c-actor-ui
    from:
      shapeId: actor
      portId: right
    to:
      shapeId: ui
      portId: left
    type: orthogonal
    label: uses
    style: {}
    metadata: {}
  - id: c-ui-backend
    from:
      shapeId: ui
      portId: right
    to:
      shapeId: backend
      portId: left
    type: orthogonal
    label: HTTPS
    style: {}
    metadata: {}
  - id: c-backend-users
    from:
      shapeId: backend
      portId: right
    to:
      shapeId: users-svc
      portId: left
    type: orthogonal
    label: REST
    style: {}
    metadata: {}
  - id: c-backend-orders
    from:
      shapeId: backend
      portId: right
    to:
      shapeId: orders-svc
      portId: left
    type: orthogonal
    label: REST
    style: {}
    metadata: {}
  - id: c-backend-notifications
    from:
      shapeId: backend
      portId: right
    to:
      shapeId: notifications-svc
      portId: left
    type: orthogonal
    label: REST
    style: {}
    metadata: {}
groups:
  - id: microservices
    label: Microservices
    shapeIds:
      - users-svc
      - orders-svc
      - notifications-svc
    style: {}
    metadata: {}
viewport:
  x: 0
  y: 0
  zoom: 1
