    rotation: 0
    zIndex: 0
    label: User
    props: {}
    style:
      fill: "#ffffff"
      stroke: "#1e293b"
      strokeWidth: 2
      fontSize: 14
      fontFamily: system-ui, sans-serif
      textColor: "#0f172a"
    metadata:
      role: actor
    locked: false
  - id: ui
    type: client
    x: 180
    y: 190
    width: 140
    height: 80
    rotation: 0
    zIndex: 1
    label: UI
    props: {}
    style:
      fill: "#fef3c7"
      stroke: "#1e293b"
      strokeWidth: 2
      fontSize: 14
      fontFamily: system-ui, sans-serif
      textColor: "#0f172a"
